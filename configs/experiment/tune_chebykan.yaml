# @package _global_
defaults:
  - tune_base
  - override /model: chebykan
  - override /training: adam

experiment_name: tune-chebykan

hydra:
  sweeper:
    params:
      # below 2 is too rigid, above 8 risks Runge's phenomenon
      # (oscillation at interval edges) on [-1,1] data
      model.degree: range(2, 9)
      training.optimizer: choice(Adam, LBFGS)
