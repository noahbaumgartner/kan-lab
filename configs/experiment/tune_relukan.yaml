# @package _global_
defaults:
  - tune_base
  - override /model: relukan
  - override /training: adam

hydra:
  sweeper:
    params:
      # grid and k play the same role as in spline-based KANs, same range
      model.grid: range(3, 51)
      model.k: range(2, 6)
      training.optimizer: choice(Adam, LBFGS)
