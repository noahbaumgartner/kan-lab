# @package _global_
defaults:
  - tune_base
  - override /model: mlp
  - override /training: default

hydra:
  sweeper:
    params:
      # MLPs need more depth than KANs to match expressiveness;
      # dataset n_hidden_max caps at 3, so 4 gives MLPs a fair chance
      model.n_hidden_layers: range(1, 5)
