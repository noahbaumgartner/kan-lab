# @package _global_
defaults:
  - tune_base
  - override /model: pykan
  - override /training: default

model:
  grid_refinement_schedule: [50]
  grid_refinement_steps: 1500
  k: 3

hydra:
  sweeper:
    params:
      # wider LR range to cover both Adam (low) and LBFGS (high)
      training.lr: tag(log, interval(0.001, 1.0))
      training.optimizer: choice(Adam, LBFGS)
