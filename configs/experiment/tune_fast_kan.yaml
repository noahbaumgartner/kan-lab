# @package _global_
defaults:
  - tune_base
  - override /model: fast_kan
  - override /training: adam

hydra:
  sweeper:
    params:
      # 4 is the minimum for reasonable coverage of [-1,1] data,
      # 32 gives ~1 RBF per 0.06 units, comparable to grid=50 in spline KANs
      model.num_grids: range(4, 33)
      # all datasets use [-1,1] inputs; 0.5 is the tightest useful bound,
      # 3.0 adds margin for intermediate activations in deeper layers
      model.grid_min: interval(-3.0, -0.5)
      model.grid_max: interval(0.5, 3.0)
      training.optimizer: choice(Adam, LBFGS)
