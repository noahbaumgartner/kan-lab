# @package _global_
defaults:
  - override /hydra/sweeper: optuna
  - override /hydra/sweeper/sampler: tpe

seed: 42

training:
  epochs: 500

hydra:
  sweeper:
    sampler:
      seed: ${seed}
    direction: minimize

    n_trials: 100
    # TPE samples from the posterior built on completed trials — parallel trials
    # would all see the same stale posterior, wasting the sampler's intelligence.
    n_jobs: 1
    params:
      model.n_hidden_layers: range(${dataset.n_hidden_min}, ${dataset.n_hidden_max})
      model.hidden_width: range(${dataset.hidden_width_min}, ${dataset.hidden_width_max})
