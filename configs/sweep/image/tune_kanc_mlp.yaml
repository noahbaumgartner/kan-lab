# @package _global_
defaults:
  - override /hydra/sweeper: optuna
  - override /hydra/sweeper/sampler: tpe
  - override /model: kanc_mlp
  - override /training: adam

seed: 42

training:
  epochs: 100

hydra:
  sweeper:
    sampler:
      seed: ${seed}
    direction: minimize

    n_trials: 100
    n_jobs: 1
    params:
      optimizer: choice(adam, adamw, sgd)
      training.batch_size: choice(16, 32, 64, 128)
      model.grid_size: range(3, 21)
      model.hidden_dim: range(32, 257)
      optimizer.lr: tag(log, interval(0.001, 1.0))
      ++optimizer.weight_decay: tag(log, interval(1e-6, 1e-2))
      ++optimizer.momentum: interval(0.0, 0.99)
