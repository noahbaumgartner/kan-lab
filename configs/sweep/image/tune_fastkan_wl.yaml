# @package _global_
defaults:
  - /sweep/tune_base
  - override /model: fastkan
  - override /training: adam

training:
  epochs: 20

hydra:
  sweeper:
    n_trials: 20
    params:
      optimizer: choice(adam, adamw, sgd)
      model.num_grids: range(4, 51)
      optimizer.lr: tag(log, interval(0.001, 1.0))
      ++optimizer.weight_decay: tag(log, interval(1e-6, 1e-2))
      ++optimizer.momentum: interval(0.0, 0.99)
      # Image -> vector reduction. input_dim follows automatically via the
      # reduced_dim resolver. Expand the choice() lists to search more.
      dataset.reduction: choice(avgpool, kymatio)
      dataset.pool_stride: choice(4, 8)
      dataset.scattering_J: choice(2, 3)
