# @package _global_
# Sweep config for tuning efficientkan on the MNIST and Gaussian-Blob datasets.
# Same search space as functional/tune_efficientkan, but with a reduced epoch
# budget and trial count appropriate for the (much) larger MNIST training set.
defaults:
  - /sweep/tune_base
  - override /model: efficientkan
  - override /training: adam

training:
  epochs: 100

hydra:
  sweeper:
    n_trials: 50
    params:
      optimizer: choice(adam, adamw, sgd)
      model.grid_size: range(3, 51)
      optimizer.lr: tag(log, interval(0.001, 1.0))
      ++optimizer.weight_decay: tag(log, interval(1e-6, 1e-2))
      ++optimizer.momentum: interval(0.0, 0.99)
