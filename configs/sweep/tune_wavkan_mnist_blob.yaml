# @package _global_
# Sweep config for tuning wavkan on the MNIST and Gaussian-Blob datasets.
# Same search space as tune_wavkan, but with a reduced epoch budget that
# is more appropriate for the (much) larger MNIST training set.
defaults:
  - tune_wavkan

training:
  epochs: 50

hydra:
  sweeper:
    n_trials: 50
